<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">

<section class="container" style="max-width: 420px;">

<h2 class="text-accent mb-4 text-center">
Login
</h2>

<form method="post"
      th:action="@{/login}"
      novalidate
      class="needs-validation">

<div class="mb-3">

<input name="username"
       class="form-control"
       placeholder="Username"
       minlength="3"
       required
       autocomplete="username">

<div class="invalid-feedback">
Username is required.
</div>

</div>

<div class="mb-3">

<input name="password"
       type="password"
       class="form-control"
       placeholder="Password"
       minlength="4"
       required
       autocomplete="current-password">

<div class="invalid-feedback">
Password is required.
</div>

</div>

<button class="btn btn-primary w-100">
Login
</button>

</form>

</section>

</html>
