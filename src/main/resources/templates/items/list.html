<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">

<section>

<h2 class="text-accent mb-4">
NASA Items
</h2>

<form method="get"
      th:action="@{/items}"
      class="row mb-4">

<div class="col-md-4">

<input name="title"
       th:value="${title}"
       class="form-control"
       placeholder="Search title">

</div>

<div class="col-md-3">

<select name="mediaType"
        class="form-select">

<option value="">
All Media
</option>

<option value="image"
        th:selected="${mediaType == 'image'}">
Image
</option>

<option value="video"
        th:selected="${mediaType == 'video'}">
Video
</option>

<option value="dataset"
        th:selected="${mediaType == 'dataset'}">
Dataset
</option>

</select>

</div>

<div class="col-md-3">

<select name="sourceApi"
        class="form-select">

<option value="">
All Sources
</option>

<option value="APOD"
        th:selected="${sourceApi == 'APOD'}">
APOD
</option>

<option value="IMAGE_LIBRARY"
        th:selected="${sourceApi == 'IMAGE_LIBRARY'}">
IMAGE_LIBRARY
</option>

<option value="OSDR"
        th:selected="${sourceApi == 'OSDR'}">
OSDR
</option>

</select>

</div>

<div class="col-md-2">

<button class="btn btn-primary w-100">
Search
</button>

</div>

</form>

<div th:if="${items.content.isEmpty()}">

<p class="text-muted">
No items found.
</p>

</div>

<div class="row">

<div class="col-md-4 mb-4"
     th:each="item : ${items.content}">

<div class="card item-card h-100">

<img th:if="${item.thumbnailUrl}"
     th:src="${item.thumbnailUrl}"
     class="card-img-top">

<div class="card-body d-flex flex-column">

<h5 class="text-accent card-title"
    th:text="${item.title}">
</h5>

<span class="badge bg-info text-dark mb-2"
      th:text="${item.mediaType}">
</span>

<p class="small text-muted flex-grow-1"
   th:text="${#strings.abbreviate(item.description,150)}">
</p>

<a th:href="@{/items/{id}(id=${item.itemId})}"
   class="btn btn-outline-info btn-sm mt-auto">
View Details
</a>

</div>

</div>

</div>

</div>

<div class="d-flex justify-content-center mt-4">

<a th:if="${items.hasPrevious()}"
   th:href="@{/items(
       page=${items.number - 1},
       title=${title},
       mediaType=${mediaType},
       sourceApi=${sourceApi}
   )}"
   class="btn btn-outline-info me-2">
Previous
</a>

<span class="align-self-center">
Page <span th:text="${items.number + 1}"></span>
</span>

<a th:if="${items.hasNext()}"
   th:href="@{/items(
       page=${items.number + 1},
       title=${title},
       mediaType=${mediaType},
       sourceApi=${sourceApi}
   )}"
   class="btn btn-outline-info ms-2">
Next
</a>

</div>

</section>

</html>
